version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      # example: DB_URI injected from secrets in Portainer
      MONGO_URI: ${MONGO_URI:-mongodb://${MONGO_INITDB_ROOT_USERNAME:-root}:${MONGO_INITDB_ROOT_PASSWORD:-mongo01}@mongo:${MONGO_PORT:-27017}/${MONGO_INITDB_DATABASE:-testdb}}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "${BACKEND_PORT:-3000}:3000"
    depends_on:
      - mongo
    volumes:
      - ./backend/firebase-service-account.json:/app/firebase-service-account.json

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:3000/}
    environment:
      PORT: ${FRONTEND_PORT:-5173}
      NODE_ENV: ${NODE_ENV:-production}
    ports:
      - "${FRONTEND_PORT:-5173}:80"

  mongo:
    image: mongo:4
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-mongo01}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-testdb}
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
volumes:
  mongo_data: